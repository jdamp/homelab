apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code
  labels:
    app: claude-code
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claude-code
  template:
    metadata:
      labels:
        app: claude-code
    spec:
      automountServiceAccountToken: false
      serviceAccountName: claude-code
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: claude-code
          image: ghcr.io/jdamp/claude-code:2.1.112
          imagePullPolicy: Always
          args: ["claude", "--channels", "plugin:telegram@claude-plugins-official"]
          stdin: true
          tty: true
          env:
            - name: HOME
              value: /home/claude
            - name: CLAUDE_CONFIG_DIR
              value: /claude
            - name: ANTHROPIC_LOG
              value: debug
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-token
                  key: TELEGRAM_BOT_TOKEN
          ports:
            - containerPort: 22
              protocol: TCP
          volumeMounts:
            - name: claude-home
              mountPath: /home/claude
            - name: claude-config
              mountPath: /claude
            - name: claude-workspace
              mountPath: /workspace
            - name: ssh-authorized-keys
              mountPath: /etc/ssh/authorized_keys
              subPath: authorized_keys
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - NET_RAW
          livenessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3

      volumes:
        - name: claude-home
          persistentVolumeClaim:
            claimName: claude-home-pvc
        - name: claude-config
          persistentVolumeClaim:
            claimName: claude-config-pvc
        - name: claude-workspace
          persistentVolumeClaim:
            claimName: claude-workspace-pvc
        - name: ssh-authorized-keys
          secret:
            secretName: ssh-authorized-keys
            defaultMode: 0440

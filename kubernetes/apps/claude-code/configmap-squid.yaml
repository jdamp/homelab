apiVersion: v1
kind: ConfigMap
metadata:
  name: squid-config
data:
  squid.conf: |
    acl localnet src 127.0.0.0/8

    acl blocked_domains dstdomain "/etc/squid/blocked-domains.txt"

    acl SSL_ports port 443
    acl CONNECT method CONNECT
    http_access deny CONNECT !SSL_ports

    http_access deny blocked_domains
    http_access allow localnet
    http_access deny all

    http_port 3128

    # Don't drop to the proxy user — the container provides isolation
    cache_effective_user root
    cache_effective_group root

    access_log stdio:/dev/stdout
    cache_log stdio:/dev/stderr

    cache deny all

  blocked-domains.txt: |
    # Password manager — prevent Claude from accessing credentials
    password.mauzlab.de

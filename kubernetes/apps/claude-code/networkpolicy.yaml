apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-code-allow
spec:
  podSelector:
    matchLabels:
      app: claude-code
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # SSH from any source (arrives via NodePort NAT)
    - ports:
        - port: 22
          protocol: TCP
  egress:
    # DNS restricted to kube-dns in kube-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTP/HTTPS for Squid sidecar to reach allowlisted domains
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP

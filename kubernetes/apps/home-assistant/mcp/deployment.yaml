apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant-mcp
  labels:
    app: home-assistant-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-assistant-mcp
  template:
    metadata:
      labels:
        app: home-assistant-mcp
    spec:
      containers:
        - name: home-assistant-mcp
          image: ghcr.io/homeassistant-ai/home-assistant-mcp:7.3.0
          env:
            - name: HOMEASSISTANT_URL
              value: "http://home-assistant.home-assistant.svc.cluster.local:8123"
            - name: HOMEASSISTANT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: home-assistant-mcp-secret
                  key: token
          command: ["fastmcp", "run", "fastmcp-http.json"]
          ports:
            - containerPort: 8086

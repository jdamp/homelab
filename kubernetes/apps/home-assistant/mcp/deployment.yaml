apiVersion: apps/v1
kind: Deployment
metadata:
  name: ha-mcp
  labels:
    app: ha-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ha-mcp
  template:
    metadata:
      labels:
        app: ha-mcp
    spec:
      containers:
        - name: ha-mcp
          image: ghcr.io/homeassistant-ai/ha-mcp:7.3.0
          env:
            - name: HOMEASSISTANT_URL
              value: "http://home-assistant.home-assistant.svc.cluster.local:8123"
            - name: HOMEASSISTANT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ha-mcp-secret
                  key: token
          ports:
            - containerPort: 8080

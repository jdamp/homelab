apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.10.1
          command:
            - /bin/sh
            - -c
            - pip install --no-cache-dir psycopg2-binary==2.9.11 && mlflow server --host=0.0.0.0 --port=5000 --default-artifact-root=/mlflow/artifacts
          env:
            - name: MLFLOW_BACKEND_STORE_URI
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: uri
          ports:
            - containerPort: 5000
              name: http
          volumeMounts:
            - name: artifacts
              mountPath: /mlflow/artifacts
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
